spring.application.name=Pawtok
# Database Config (with fallbacks for local dev)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/pawtok}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}

# JPA/Hibernate Config
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=${PORT:8080}
server.max-http-header-size=1048576
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-http-form-post-size=-1

# CORS config
spring.web.cors.allowed-origin-patterns=${CORS_ORIGINS:http://localhost:*}
spring.web.cors.allow-credentials=true
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Cloudinary Config
cloudinary.url=${CLOUDINARY_URL:cloudinary://dummy_key:dummy_secret@dummy_name}
