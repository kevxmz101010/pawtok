spring.application.name=Pawtok
spring.datasource.url=jdbc:mysql://localhost:3306/pawtok
spring.datasource.username=root
spring.datasource.password=root
# JPA/Hibernate Config
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8080
server.max-http-header-size=1048576
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-http-form-post-size=-1

# Configure CORS to allow credentials from frontend
spring.web.cors.allowed-origin-patterns=http://localhost:*
spring.web.cors.allow-credentials=true
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
